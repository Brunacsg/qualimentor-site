<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal QA - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="login">
  <div class="login-page">
    <div class="login-panel">
      <div class="brand">
        <h1>Portal QA</h1>
        <p>Bem-vindo ao portal completo de Qualidade de Software.</p>
      </div>

      <div class="form-card">
        <h2>Login</h2>
        <input id="email" type="email" placeholder="Email" autocomplete="username" required>
        <input id="password" type="password" placeholder="Senha" autocomplete="current-password" required>
        <button type="button" onclick="login()">Entrar</button>
        <p class="hint">Acesso apenas para e-mails previamente cadastrados pelo administrador.</p>
        <p class="note">Peça seu login por email e senha ao responsável pelo portal.</p>
        <p id="msg" class="message"></p>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obrigado pelo Contato</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #e6f0ff; /* Fundo azul claro igual ao site */
      color: #333333;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #ffffff; /* Container branco */
      padding: 40px 60px;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 500px;
    }

    .logo {
      max-width: 150px;
      margin-bottom: 25px;
    }

    h1 {
      color: #007BFF;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 30px;
    }

    a.btn {
      display: inline-block;
      text-decoration: none;
      background: #007BFF;
      color: #ffffff;
      padding: 12px 25px;
      border-radius: 5px;
      transition: background 0.3s ease;
    }

    a.btn:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="images/IMG_0978.jpeg" alt="Qualimentor" class="logo">
    <h1>Obrigado pelo seu contato!</h1>
    <p>Sua mensagem foi enviada com sucesso. Em breve nossa equipe entrará em contato com você.</p>
    <a href="https://www.qualimentor.tec.br" class="btn">Voltar ao site</a>
  </div>
</body>
</html>

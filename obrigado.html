<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obrigado pelo Contato</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#0f172a; /* Azul escuro */
    color:#ffffff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:#111111; /* Preto */
    padding:40px 60px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
    text-align:center;
    max-width:500px;
}

.logo{
    max-width:160px;
    margin-bottom:25px;
}

h1{
    color:#ffffff;
    margin-bottom:20px;
    font-size:28px;
}

p{
    font-size:1.1rem;
    margin-bottom:30px;
    color:#d1d5db;
}

a.btn{
    display:inline-block;
    text-decoration:none;
    background:#1e3a8a; /* Azul escuro destaque */
    color:#ffffff;
    padding:12px 25px;
    border-radius:6px;
    font-weight:bold;
    transition:all 0.3s ease;
}

a.btn:hover{
    background:#2563eb; /* Azul hover */
    transform:translateY(-2px);
}

</style>

</head>

<body>

<div class="container">

<img src="images/logo.png" alt="Qualimentor" class="logo">

<h1>Obrigado pelo seu contato!</h1>

<p>
Sua mensagem foi enviada com sucesso.<br>
Em breve nossa equipe entrará em contato com você.
</p>

<a href="https://www.qualimentor.tec.br" class="btn">
Voltar ao site
</a>

</div>

</body>
</html>
